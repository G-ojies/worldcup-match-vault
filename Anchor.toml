[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
worldcup_match_vault = "E5ffcawirq6hVse98NJVDGQ4RSkkNAYWzN2RNoRAikzJ"

[programs.devnet]
worldcup_match_vault = "E5ffcawirq6hVse98NJVDGQ4RSkkNAYWzN2RNoRAikzJ"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
# TypeScript integration suite (runs against the local validator via `anchor test`).
# Rust LiteSVM tests run separately and faster with `cargo test`.
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

